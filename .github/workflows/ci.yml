name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: nightly-2026-03-01

jobs:
  build:
    name: Clippy + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly-2026-03-01
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-01
          targets: riscv64imac-unknown-none-elf
          components: clippy, rust-src

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clippy (warnings as errors)
        run: cargo clippy
          -Z build-std=core,alloc
          -Z build-std-features=compiler-builtins-mem
          --target riscv64imac-unknown-none-elf
          --release
          -- -D warnings

      - name: Build
        run: cargo build
          --release
          -Z build-std=core,alloc
          -Z build-std-features=compiler-builtins-mem
          --target riscv64imac-unknown-none-elf

      - name: Unsafe documentation check (informational)
        run: cargo clippy
          -Z build-std=core,alloc
          -Z build-std-features=compiler-builtins-mem
          --target riscv64imac-unknown-none-elf
          --release
          -- -W clippy::undocumented_unsafe_blocks 2>&1 | tee unsafe_check.log
        continue-on-error: true

      # U-17 GÖREV 6: Cargo.lock integrity (informational)
      # build-std + --locked uyumsuzluk olabilir; sadece check ile bilgilendirme
      - name: Verify Cargo.lock integrity (informational)
        run: cargo check --locked 2>&1 || echo "WARN: --locked failed (build-std compat)"
        continue-on-error: true

      # U-17 GÖREV 4: Constant-time verification (informational)
      # ct_eq_16 disassembly audit — LTO inline durumunda call-site kontrol
      - name: Constant-time verification (informational)
        run: |
          if [ -f scripts/verify-ct-eq.sh ]; then
            bash scripts/verify-ct-eq.sh
          else
            echo "verify-ct-eq.sh not found, skipping"
          fi
        continue-on-error: true

  qemu-test:
    name: QEMU Boot Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly-2026-03-01
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-01
          targets: riscv64imac-unknown-none-elf
          components: rust-src

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-misc

      # U-17: QEMU self-test build (test suite + trace + debug-boot enabled)
      # Production binary'de test yok — self-test feature explicitly ister
      - name: Build (self-test feature)
        run: cargo build
          --release
          --features self-test
          -Z build-std=core,alloc
          -Z build-std-features=compiler-builtins-mem
          --target riscv64imac-unknown-none-elf

      - name: QEMU boot + test suite
        run: |
          # QEMU'yu background'da başlat, output'u log'a yaz
          timeout 45 qemu-system-riscv64 \
            -machine virt \
            -nographic \
            -bios none \
            -m 512M \
            -smp 1 \
            -kernel target/riscv64imac-unknown-none-elf/release/sipahi \
            > boot.log 2>&1 &
          QEMU_PID=$!

          # 30 saniye boyunca "ALL TESTS PASSED" bekle (polling)
          PASSED=0
          for i in $(seq 1 30); do
            if grep -q "ALL TESTS PASSED" boot.log 2>/dev/null; then
              echo "Tests passed at ${i}s"
              PASSED=1
              kill $QEMU_PID 2>/dev/null || true
              wait $QEMU_PID 2>/dev/null || true
              break
            fi
            sleep 1
          done

          # Cleanup
          kill $QEMU_PID 2>/dev/null || true
          wait $QEMU_PID 2>/dev/null || true

          echo "--- Boot log ---"
          cat boot.log

          # Final checks
          if [ "$PASSED" -ne 1 ]; then
            echo "FAIL: Tests did not pass within 30 seconds"
            exit 1
          fi

          if grep -q "BOOT HALTED" boot.log; then
            echo "FAIL: Boot halted"
            exit 1
          fi

          # U-21 GÖREV 13 [M12]: NF (nested fault) regression guard.
          # task_trampoline / start_first_task fix'leri (U-18/U-19/U-21 G5)
          # sonrası bu marker hiçbir build'de görünmemeli.
          if grep -q "^NF$" boot.log; then
            echo "FAIL: Nested fault detected in self-test"
            exit 1
          fi

          # FAIL marker tarama — herhangi bir self-test fail'i regression
          if grep -q "\[FAIL\]" boot.log; then
            echo "FAIL: Test failure marker present"
            exit 1
          fi

          echo "QEMU self-test passed"

      # U-21 GÖREV 13 [M12]: Production smoke test — self-test'ten ayrı
      # production binary boot edip NF/FATAL üretmediğini doğrula.
      - name: Production smoke (NF guard)
        run: |
          cargo build \
            --release \
            -Z build-std=core,alloc \
            -Z build-std-features=compiler-builtins-mem \
            --target riscv64imac-unknown-none-elf

          timeout 8s qemu-system-riscv64 \
            -machine virt \
            -nographic \
            -bios none \
            -m 512M \
            -smp 1 \
            -kernel target/riscv64imac-unknown-none-elf/release/sipahi \
            > prod.log 2>&1 || true

          echo "--- Production log ---"
          cat prod.log

          if grep -q "^NF$" prod.log; then
            echo "FAIL: Nested fault in production"
            exit 1
          fi
          if grep -q "FATAL" prod.log; then
            echo "FAIL: FATAL marker in production"
            exit 1
          fi
          echo "Production smoke passed"

  audit:
    name: Supply Chain Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install audit tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Cargo audit (RustSec advisories)
        run: cargo audit

      - name: Cargo deny (full policy check)
        run: cargo deny check

  kani:
    name: Kani Formal Verification (full)
    runs-on: ubuntu-latest
    # Sadece master push'unda çalışır — PR'larda 40 dk beklenmez
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Kani
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.kani
          key: kani-${{ runner.os }}-v1

      - name: Install Kani (if not cached)
        run: |
          if ! command -v cargo-kani &> /dev/null; then
            cargo install --locked kani-verifier
            cargo kani setup
          fi

      - name: Run all Kani harnesses
        run: cargo kani

  kani-fast:
    name: Kani Critical Subset (PR)
    runs-on: ubuntu-latest
    # PR'larda hızlı sanity check — full Kani master'da çalışır
    # U-20 GÖREV 6: ~5 kritik proof, dakikalar mertebesinde tamamlanır
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # U-20: cargo build cache eksikti — her PR sıfırdan derliyordu.
      # Build job ile aynı key (Cargo.lock hash) → kullanılabiliyorsa shared cache.
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache Kani
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.kani
          key: kani-${{ runner.os }}-v1

      - name: Install Kani (if not cached)
        run: |
          if ! command -v cargo-kani &> /dev/null; then
            cargo install --locked kani-verifier
            cargo kani setup
          fi

      # U-20 fix: 5 ayrı `cargo kani --harness X` çağrısı = 5 ayrı rebuild
      # (deps + blake3 + ed25519-dalek her seferinde recompile). Tek
      # invocation ile multiple --harness flag → tek build, 5 harness.
      # Kani docs: "Use `--harness <NAME>` ... You can specify this option
      # multiple times to run multiple harnesses."
      - name: Run critical proof subset (single build)
        run: |
          cargo kani \
            --harness wcet_ordering_consistent \
            --harness token_owner_mismatch_always_rejected \
            --harness decide_action_lockstep_pure \
            --harness isolated_task_never_becomes_ready \
            --harness watchdog_limit_zero_disables

  # U-21 GÖREV 21: Mutation testing — PR'larda informational
  mutation-test:
    name: Mutation Testing (informational)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-01
          targets: riscv64imac-unknown-none-elf
          components: rust-src
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: Run mutation tests on diff
        run: cargo mutants --in-diff --timeout 120 || true

  # U-21 GÖREV 21: unsafe block count tracking — release-blocking değil
  unsafe-count:
    name: Unsafe Block Count
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Count unsafe blocks
        run: |
          COUNT=$(grep -rn "unsafe {" src/ | wc -l)
          echo "Unsafe blocks: $COUNT"
          # Defense-in-depth: 200'ün üzerine çıkarsa anomali
          if [ "$COUNT" -gt 200 ]; then
            echo "WARN: Unsafe block count > 200 — review needed"
          fi
