name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: nightly-2026-03-01

jobs:
  build:
    name: Clippy + Build
    runs-on: ubuntu-latest
    # U-23: KERNEL_RUSTFLAGS Makefile'a taşındı (.cargo/config.toml inheritance
    # task crate'lere sızıyordu). CI direkt `cargo` çağırdığı için env burada.
    env:
      RUSTFLAGS: "-C link-arg=-Tsipahi.ld"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly-2026-03-01
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-01
          targets: riscv64imac-unknown-none-elf
          components: clippy, rust-src

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clippy (warnings as errors)
        run: cargo clippy
          -Z build-std=core,alloc
          -Z build-std-features=compiler-builtins-mem
          --target riscv64imac-unknown-none-elf
          --release
          -- -D warnings

      - name: Build
        run: cargo build
          --release
          -Z build-std=core,alloc
          -Z build-std-features=compiler-builtins-mem
          --target riscv64imac-unknown-none-elf

      - name: Unsafe documentation check (informational)
        run: cargo clippy
          -Z build-std=core,alloc
          -Z build-std-features=compiler-builtins-mem
          --target riscv64imac-unknown-none-elf
          --release
          -- -W clippy::undocumented_unsafe_blocks 2>&1 | tee unsafe_check.log
        continue-on-error: true

      # U-17 GÖREV 6: Cargo.lock integrity (informational)
      # build-std + --locked uyumsuzluk olabilir; sadece check ile bilgilendirme
      - name: Verify Cargo.lock integrity (informational)
        run: |
          cargo check --locked 2>&1 || echo "WARN: --locked failed (build-std compat)"
        continue-on-error: true

      # U-17 GÖREV 4: Constant-time verification (informational)
      # ct_eq_16 disassembly audit — LTO inline durumunda call-site kontrol
      - name: Constant-time verification (informational)
        run: |
          if [ -f scripts/verify-ct-eq.sh ]; then
            bash scripts/verify-ct-eq.sh
          else
            echo "verify-ct-eq.sh not found, skipping"
          fi
        continue-on-error: true

  qemu-test:
    name: QEMU Boot Test
    runs-on: ubuntu-latest
    needs: build
    env:
      RUSTFLAGS: "-C link-arg=-Tsipahi.ld"  # U-23: kernel linker script

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly-2026-03-01
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-01
          targets: riscv64imac-unknown-none-elf
          components: rust-src

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-misc

      # U-17: QEMU self-test build (test suite + trace + debug-boot enabled)
      # Production binary'de test yok — self-test feature explicitly ister
      - name: Build (self-test feature)
        run: cargo build
          --release
          --features self-test
          -Z build-std=core,alloc
          -Z build-std-features=compiler-builtins-mem
          --target riscv64imac-unknown-none-elf

      - name: QEMU boot + test suite
        run: |
          # QEMU'yu background'da başlat, output'u log'a yaz
          timeout 45 qemu-system-riscv64 \
            -machine virt \
            -nographic \
            -bios none \
            -m 512M \
            -smp 1 \
            -kernel target/riscv64imac-unknown-none-elf/release/sipahi \
            > boot.log 2>&1 &
          QEMU_PID=$!

          # 30 saniye boyunca "ALL TESTS PASSED" bekle (polling)
          PASSED=0
          for i in $(seq 1 30); do
            if grep -q "ALL TESTS PASSED" boot.log 2>/dev/null; then
              echo "Tests passed at ${i}s"
              PASSED=1
              kill $QEMU_PID 2>/dev/null || true
              wait $QEMU_PID 2>/dev/null || true
              break
            fi
            sleep 1
          done

          # Cleanup
          kill $QEMU_PID 2>/dev/null || true
          wait $QEMU_PID 2>/dev/null || true

          echo "--- Boot log ---"
          cat boot.log

          # Final checks
          if [ "$PASSED" -ne 1 ]; then
            echo "FAIL: Tests did not pass within 30 seconds"
            exit 1
          fi

          if grep -q "BOOT HALTED" boot.log; then
            echo "FAIL: Boot halted"
            exit 1
          fi

          # U-21 GÖREV 13 [M12]: NF (nested fault) regression guard.
          # task_trampoline / start_first_task fix'leri (U-18/U-19/U-21 G5)
          # sonrası bu marker hiçbir build'de görünmemeli.
          if grep -q "^NF$" boot.log; then
            echo "FAIL: Nested fault detected in self-test"
            exit 1
          fi

          # FAIL marker tarama — herhangi bir self-test fail'i regression
          if grep -q "\[FAIL\]" boot.log; then
            echo "FAIL: Test failure marker present"
            exit 1
          fi

          echo "QEMU self-test passed"

      # U-21 GÖREV 13 [M12]: Production smoke test — self-test'ten ayrı
      # production binary boot edip NF/FATAL üretmediğini doğrula.
      - name: Production smoke (NF guard)
        run: |
          cargo build \
            --release \
            -Z build-std=core,alloc \
            -Z build-std-features=compiler-builtins-mem \
            --target riscv64imac-unknown-none-elf

          timeout 8s qemu-system-riscv64 \
            -machine virt \
            -nographic \
            -bios none \
            -m 512M \
            -smp 1 \
            -kernel target/riscv64imac-unknown-none-elf/release/sipahi \
            > prod.log 2>&1 || true

          echo "--- Production log ---"
          cat prod.log

          if grep -q "^NF$" prod.log; then
            echo "FAIL: Nested fault in production"
            exit 1
          fi
          if grep -q "FATAL" prod.log; then
            echo "FAIL: FATAL marker in production"
            exit 1
          fi
          echo "Production smoke passed"

  audit:
    name: Supply Chain Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install audit tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: Cargo audit (RustSec advisories)
        run: cargo audit

      - name: Cargo deny (full policy check)
        run: cargo deny check

  kani:
    name: Kani Formal Verification (full)
    runs-on: ubuntu-latest
    # Sadece master push'unda çalışır — PR'larda 40 dk beklenmez
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Kani
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.kani
          key: kani-${{ runner.os }}-v1

      - name: Install Kani (if not cached)
        run: |
          if ! command -v cargo-kani &> /dev/null; then
            cargo install --locked kani-verifier
            cargo kani setup
          fi

      - name: Run all Kani harnesses
        run: cargo kani

  kani-fast:
    name: Kani Critical Subset (PR)
    runs-on: ubuntu-latest
    # PR'larda hızlı sanity check — full Kani master'da çalışır
    # U-20 GÖREV 6: ~5 kritik proof, dakikalar mertebesinde tamamlanır
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # U-20: cargo build cache eksikti — her PR sıfırdan derliyordu.
      # Build job ile aynı key (Cargo.lock hash) → kullanılabiliyorsa shared cache.
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache Kani
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-kani
            ~/.kani
          key: kani-${{ runner.os }}-v1

      - name: Install Kani (if not cached)
        run: |
          if ! command -v cargo-kani &> /dev/null; then
            cargo install --locked kani-verifier
            cargo kani setup
          fi

      # U-20 fix: 5 ayrı `cargo kani --harness X` çağrısı = 5 ayrı rebuild
      # (deps + blake3 + ed25519-dalek her seferinde recompile). Tek
      # invocation ile multiple --harness flag → tek build, 5 harness.
      # Kani docs: "Use `--harness <NAME>` ... You can specify this option
      # multiple times to run multiple harnesses."
      - name: Run critical proof subset (single build)
        run: |
          cargo kani \
            --harness wcet_ordering_consistent \
            --harness token_owner_mismatch_always_rejected \
            --harness decide_action_lockstep_pure \
            --harness isolated_task_never_becomes_ready \
            --harness watchdog_limit_zero_disables

  # U-21 GÖREV 21: Mutation testing — PR'larda informational
  mutation-test:
    name: Mutation Testing (informational)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-01
          targets: riscv64imac-unknown-none-elf
          components: rust-src
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: Run mutation tests on diff
        run: cargo mutants --in-diff --timeout 120 || true

  # U-21 GÖREV 21: unsafe block count tracking — release-blocking değil
  unsafe-count:
    name: Unsafe Block Count
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Count unsafe blocks
        run: |
          COUNT=$(grep -rn "unsafe {" src/ | wc -l)
          echo "Unsafe blocks: $COUNT"
          # Defense-in-depth: 200'ün üzerine çıkarsa anomali
          if [ "$COUNT" -gt 200 ]; then
            echo "WARN: Unsafe block count > 200 — review needed"
          fi

  # U-22 GÖREV 9 [M15]: ct_eq_16 constant-time disassembly gate.
  # Token validation karşılaştırması early-exit yapmamalı, branch içermemeli.
  # ct_eq_16 #[inline(always)] olduğunda ayrı sembol olmaz — fallback:
  # validate_full disassembly'sinde branch sayısını sınırla.
  ct-eq-verify:
    name: ct_eq Constant-Time Verification
    runs-on: ubuntu-latest
    needs: build
    env:
      RUSTFLAGS: "-C link-arg=-Tsipahi.ld"  # U-23: kernel linker script
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + RISC-V target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-01
          targets: riscv64imac-unknown-none-elf
          components: rust-src, llvm-tools-preview
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install RISC-V binutils
        run: sudo apt update && sudo apt install -y binutils-riscv64-linux-gnu
      - name: Build release
        run: cargo build --release -Z build-std=core,alloc -Z build-std-features=compiler-builtins-mem --target riscv64imac-unknown-none-elf
      - name: Verify ct_eq_16 branch-free path
        run: |
          BIN=target/riscv64imac-unknown-none-elf/release/sipahi
          # Mangled symbol arama — Rust hash suffix ekler
          SYMBOL=$(riscv64-linux-gnu-nm $BIN 2>/dev/null | grep ct_eq_16 | head -1 | awk '{print $3}')
          if [ -z "$SYMBOL" ]; then
              echo "ct_eq_16 inlined — fallback: scan validate_full disassembly"
              riscv64-linux-gnu-objdump -d $BIN > /tmp/full.asm
              # validate_full sembol yakala (mangled fragment)
              grep -n "validate_full" /tmp/full.asm | head -3
              awk '/<.*validate_full.*>:/{flag=1; next} /^$/{flag=0} flag' /tmp/full.asm > /tmp/validate.asm
              COUNT=$(grep -cE "^\s*[0-9a-f]+:\s+\S+\s+(bne|beq|blt|bge|bnez|beqz|bgeu|bltu)" /tmp/validate.asm || echo 0)
              echo "Branches in validate_full disassembly: $COUNT"
              # Threshold: validate_full normal logic'i (cache check, owner, nonce,
              # expiry) ~15 branch; ct_eq kendisi 0 ekler. > 30 anomali.
              if [ "$COUNT" -gt 30 ]; then
                  echo "FAIL: too many branches in validate_full — possible early-exit regression"
                  cat /tmp/validate.asm
                  exit 1
              fi
              echo "PASS: validate_full branches within bound ($COUNT <= 30)"
          else
              riscv64-linux-gnu-objdump -d --disassemble=$SYMBOL $BIN > /tmp/cteq.asm
              if grep -qE "^\s*[0-9a-f]+:\s+\S+\s+(bne|beq|blt|bge|bnez|beqz)\s" /tmp/cteq.asm; then
                  echo "FAIL: ct_eq_16 contains branch instructions"
                  cat /tmp/cteq.asm
                  exit 1
              fi
              echo "PASS: ct_eq_16 branch-free"
          fi

  # U-22 GÖREV 23 [Codex]: Binary safety invariants — production smoke.
  # /DISCARD/ uygulanmış mı, float instruction var mı, .text bütçesi
  # aşıldı mı, .wasm_arena production'da yok mu (G8 verification).
  binary-guards:
    name: Binary Safety Invariants
    runs-on: ubuntu-latest
    needs: build
    env:
      RUSTFLAGS: "-C link-arg=-Tsipahi.ld"  # U-23: kernel linker script
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + RISC-V target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-01
          targets: riscv64imac-unknown-none-elf
          components: rust-src
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install RISC-V binutils
        run: sudo apt update && sudo apt install -y binutils-riscv64-linux-gnu
      - name: Build release
        run: cargo build --release -Z build-std=core,alloc -Z build-std-features=compiler-builtins-mem --target riscv64imac-unknown-none-elf
      - name: Check .eh_frame and .got discarded (G17)
        run: |
          BIN=target/riscv64imac-unknown-none-elf/release/sipahi
          if riscv64-linux-gnu-readelf -S $BIN | grep -qE "\.eh_frame|\.got\b"; then
              echo "FAIL: .eh_frame or .got not discarded (linker /DISCARD/ broken)"
              riscv64-linux-gnu-readelf -S $BIN | grep -E "\.eh_frame|\.got"
              exit 1
          fi
          echo "PASS: .eh_frame and .got discarded"
      - name: Check no float instructions
        run: |
          BIN=target/riscv64imac-unknown-none-elf/release/sipahi
          if riscv64-linux-gnu-objdump -d $BIN | \
             grep -qE "^\s*[0-9a-f]+:\s+\S+\s+(flw|fsw|fadd|fmul|fdiv|fsqrt|fmadd)\s"; then
              echo "FAIL: float instructions in binary (no_std + RV64IMAC: F/D illegal)"
              riscv64-linux-gnu-objdump -d $BIN | grep -E "(flw|fsw|fadd|fmul)" | head -5
              exit 1
          fi
          echo "PASS: no float instructions"
      - name: Check .text size budget
        run: |
          BIN=target/riscv64imac-unknown-none-elf/release/sipahi
          SIZE_HEX=$(riscv64-linux-gnu-readelf -S $BIN | awk '/\.text/ {print $7; exit}')
          SIZE_DEC=$((16#${SIZE_HEX}))
          echo ".text size: $SIZE_DEC bytes (budget: 65536)"
          if [ "$SIZE_DEC" -gt 65536 ]; then
              echo "FAIL: .text > 64KB — bloat regression"
              exit 1
          fi
          echo "PASS: .text within 64KB budget"
      - name: Check .wasm_arena absent in production (G8 verification)
        run: |
          BIN=target/riscv64imac-unknown-none-elf/release/sipahi
          ARENA_SIZE=$(riscv64-linux-gnu-readelf -S $BIN | awk '/\.wasm_arena/ {print $7; exit}')
          if [ -z "$ARENA_SIZE" ] || [ "$ARENA_SIZE" = "00000000" ]; then
              echo "PASS: .wasm_arena absent or empty in production"
          else
              SIZE_DEC=$((16#${ARENA_SIZE}))
              if [ "$SIZE_DEC" -gt 64 ]; then
                  echo "FAIL: .wasm_arena > 64 bytes in production (G8 wasm-sandbox feature leak)"
                  exit 1
              fi
              echo "PASS: .wasm_arena placeholder ($SIZE_DEC bytes <= 64)"
          fi

  # U-22 GÖREV 27: Feature combination build matrix — feature flag drift catch.
  feature-matrix:
    name: Feature Combination Build Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + RISC-V target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-01
          targets: riscv64imac-unknown-none-elf
          components: rust-src
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Run feature matrix
        run: bash scripts/feature_matrix.sh

  # U-24 GÖREV 12: SNTM manifest validator host tool.
  # HOST target explicit gerekli — root .cargo/config.toml RISC-V'e zorlar,
  # bu tool x86_64 host build'i.
  sntm-validate:
    name: SNTM Manifest Validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust + RISC-V target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-03-01
          targets: riscv64imac-unknown-none-elf
          components: rust-src
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      # U-24 G14 fix: sntm-validate sub-workspace (root workspace `-Z build-std`
      # ile serde'yi RISC-V'e derliyordu). cd ile invoke + explicit HOST target.
      - name: Build sntm-validate (host target, sub-workspace)
        working-directory: tools/sntm-validate
        run: |
          HOST=$(rustc -vV | sed -n 's/^host: //p')
          cargo build --target "$HOST" --release
      - name: Run integration tests (host target, sub-workspace)
        working-directory: tools/sntm-validate
        run: |
          HOST=$(rustc -vV | sed -n 's/^host: //p')
          cargo test --target "$HOST" --release
      - name: Validate sipahi.toml (host target)
        working-directory: tools/sntm-validate
        run: |
          HOST=$(rustc -vV | sed -n 's/^host: //p')
          cargo run --target "$HOST" --release -- \
            --manifest ../../sipahi.toml
