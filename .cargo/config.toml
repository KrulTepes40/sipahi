[build]
target = "riscv64imac-unknown-none-elf"

[target.riscv64imac-unknown-none-elf]
rustflags = ["-C", "link-arg=-Tsipahi.ld"]
runner = "qemu-system-riscv64 -machine virt -nographic -bios none -m 512M -smp 1 -kernel"

