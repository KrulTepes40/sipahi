SPECIFICATION Spec

(* Terminal state (all tasks Isolated) is acceptable — kernel halts gracefully. *)
CHECK_DEADLOCK FALSE

CONSTANTS
    Tasks = {t0, t1}
    Channels = {c0}             \* U-27 FIX-H: state explosion guard (1 channel)
    ReservedLowEntries = 8
    MaxPmpEntries = 16
    \* SAFE-4 (sprint-u33) Section 8 CR-5 sabitleri SipahiSNTM.tla içinde
    \* tanımlı (TLC cfg function literal parse etmiyor) — StackBytesPerTask,
    \* AnalyzerMaxWorstCase, StackMarginBytes module-level def.

INVARIANT
    TypeOK
    KernelPmpInvariant
    LoaderInvariant       \* U-26 SNTM-R9
    UModeRequiresDispatch
    NoIsolatedRunning
    AtMostOneRunning
    RunningIsCurrent
    SealedAtomicityInvariant   \* U-27 SNTM-R13
    ChannelOwnershipInvariant  \* SAFE-2 sprint-u31 CR-7
    StrongChannelOwnership     \* SAFE-3 sprint-u32 CR-3
    StackRegionBound           \* SAFE-4 sprint-u33 CR-5
