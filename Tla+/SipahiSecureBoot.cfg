SPECIFICATION Spec

(* Terminal state acceptable — Booted veya HaltedFail her ikisi de
   sona ermiş state; deadlock yok (Spec WF_vars yetersiz olabilir). *)
CHECK_DEADLOCK FALSE

CONSTANTS
    Bytes = {b0, b1}    \* state explosion guard

INVARIANT
    TypeOK
    StartedImpliesValid       \* Section 9.3 S1 — Booted ⇒ sigValid
    NoFalseAccept             \* CR-7 — tampered ⇒ ¬Booted
    AtomicVerify              \* Section 9.3 S1 — no partial state
    SigValidImpliesHeader     \* Section 9.3 S5 — negative simulation guard
