# ═══════════════════════════════════════════════════════════════════════
# Grandfather list — §18.7 quality gate exemption
# ═══════════════════════════════════════════════════════════════════════
# Bu listedeki test/proof isimleri §18.7 3-yorum kuralından muaftır:
# VERIFIES / CALLS / FAILS-IF yorumları zorunlu değil. Sebep: pre-2026-05-13
# baseline'da yazıldılar, U-18'de Kani proof quality audit'i geçtiler
# (Kategori A pure / B production / C rewritten sınıflandırması mevcut).
#
# YENİ test/proof isimleri (post-2026-05-13) buraya EKLENMEZ. Yeni eklenenler
# §18.7 3-yorum kuralına tabidir; coverage.toml'a sadece required_* listelerine
# eklenir, [grandfather] büyümez.
#
# Bu liste sadece coverage.toml'daki required_* girişleri için anlamlı.
# (200 Kani proof'un tamamı buraya eklenmedi — sadece coverage map'te
# zorunlu olarak listelenen isimler exempt sayılıyor.)

[grandfather]
exempted_until = "2026-05-13"
exempted_reason = "Pre-§18.7 baseline; U-18 quality audit'i geçti"

proofs = [
    "token_owner_mismatch_always_rejected",
    "ct_eq_16_same_input_true",
    "ct_eq_16_single_byte_diff_false",
    "bump_allocator_offsets_never_overlap",
]

tests = [
    "test_token_owner_mismatch_neg",
    "test_cross_task_pointer_rejected",
    "test_allocator_overflow",
]

# ═══════════════════════════════════════════════════════════════════════
# Requirement IDs — §18.7 traceability (placeholder schema)
# ═══════════════════════════════════════════════════════════════════════
# SNTM ve sonraki sprint'ler için requirement → test/proof traceability.
# Her requirement ID şu bilgileri taşır:
#   description    : tek cümle invariant açıklaması
#   required_tests : bu invariant'ı runtime'da kanıtlayan test isimleri
#   required_proofs: Kani veya const_assert ile compile-time kanıtlayan isimler
#   fault_model    : invariant bozulduğunda hangi gözlemlenebilir failure çıkar
#                    (test/proof'un bu fault'u yakalaması beklenir)
#
# Source kodda her test/proof üzerinde "// VERIFIES: SNTM-Rx" yorumu zorunlu
# (grandfather list dışındakiler için).
#
# Şu an placeholder — SNTM v1.5 sprint'inde SNTM-R1, R2, ... eklenir.
#
# Örnek schema:
# [requirement.SNTM-R1]
# description    = "Task regions must not overlap kernel regions"
# required_tests = ["test_task_kernel_overlap_rejected"]
# required_proofs = ["sntm_kernel_overlap_rejected_for_any_region"]
# fault_model    = "regions_overlap() always returns false → overlap silently accepted"
