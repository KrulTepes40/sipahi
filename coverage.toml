# Sipahi Feature Coverage Map — Mechanical Lazy-Bypass Guard
#
# WARNING: Bu dosya GERÇEK COVERAGE KANITI DEĞİLDİR. İsim-tabanlı mekanik
# guard'dır. Amacı: feature eklendi ama matching negative test / Kani proof
# eklenmedi → gate fail. Test/proof body'sinin yeterliliği MANUEL review işi.
#
# Senkron kuralları (scripts/check_coverage.sh enforce eder):
#   1. Cargo.toml [features]'taki her flag burada [feature.NAME] olmalı.
#   2. Burada olan her [feature.NAME] Cargo.toml'da var olmalı (stale fail).
#   3. required_negative_tests isimleri src/tests/mod.rs'te `fn NAME(`.
#   4. required_kani_proofs isimleri src/'da `fn NAME(` (kani::proof üstte).
#   5. Deferred entry zorunlu fields: deferred + deferred_reason + deferred_target.
#   6. non_safety = true → test/proof check skipped (diagnostic/meta feature).

[meta]
schema_version    = 1
last_audit        = "2026-05-13"
last_audit_sprint = "v1.1.0 (U-22)"
purpose           = "Catch lazy bypass: new feature without matching test/proof"

