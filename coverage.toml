# ═══════════════════════════════════════════════════════════════════════
# Requirement IDs — §18.7 traceability (placeholder schema)
# ═══════════════════════════════════════════════════════════════════════
# SNTM ve sonraki sprint'ler için requirement → test/proof traceability.
# Her requirement ID şu bilgileri taşır:
#   description    : tek cümle invariant açıklaması
#   required_tests : bu invariant'ı runtime'da kanıtlayan test isimleri
#   required_proofs: Kani veya const_assert ile compile-time kanıtlayan isimler
#   fault_model    : invariant bozulduğunda hangi gözlemlenebilir failure çıkar
#                    (test/proof'un bu fault'u yakalaması beklenir)
#
# Source kodda her test/proof üzerinde "// VERIFIES: SNTM-Rx" yorumu zorunlu
# (grandfather list dışındakiler için).
#
# Şu an placeholder — SNTM v1.5 sprint'inde SNTM-R1, R2, ... eklenir.
#
# Örnek schema:
# [requirement.SNTM-R1]
# description    = "Task regions must not overlap kernel regions"
# required_tests = ["test_task_kernel_overlap_rejected"]
# required_proofs = ["sntm_kernel_overlap_rejected_for_any_region"]
# fault_model    = "regions_overlap() always returns false → overlap silently accepted"

# ─── U-23 SNTM Phase 1 Requirements ─────────────────────────────────────

[requirement.SNTM-R1]
description     = "Syscall ID set complete: 0..SYSCALL_COUNT benzersiz + sıralı"
required_tests  = []
required_proofs = ["syscall_id_set_complete"]
fault_model     = "Yeni syscall eklenip SYSCALL_COUNT güncellenmediği zaman task-side ABI break (sipahi_api wrapper'ları yanlış ID kullanır)"

[requirement.SNTM-R2-id]
description     = "Syscall ID table consistency: 6 sequential IDs (0..5) + SYSCALL_COUNT=6 + WCET_EXIT=15c"
required_tests  = ["test_syscall_id_table"]
required_proofs = []
fault_model     = "Any SYS_* ID out of sequence (0..5), SYSCALL_COUNT != 6, ya da WCET_EXIT estimate drift (!= 15c)"

# SNTM-R2-full (isolate behavior runtime): DEFERRED — Sprint U-26 hedefi.
# Bu requirement coverage.toml'a U-26 başlamadan EKLENMEZ; placeholder
# olarak doc-only:
#   [requirement.SNTM-R2-full]
#   description = "exit syscall task'ı isolate eder ve scheduler atlar"
#   deferred = "runtime test needs kernel loader (Phase 4)"
#   deferred_target = "Sprint U-26 (kernel native task loader)"

# ─── U-24 SNTM Phase 2 Requirements ─────────────────────────────────────

[requirement.SNTM-R3]
description     = "Region overlap symmetric + saturating safe + empty region (size=0) no overlap"
required_tests  = ["test_regions_overlap_table"]
required_proofs = ["region_overlap_symmetric"]
fault_model     = "regions_overlap asymmetric, overflow ile false negative (saturating_add bypass), boş region (size=0) için true (must be false), ya da disjoint için yanlış true"

[requirement.SNTM-R4]
description     = "PmpProfile bounds + MAX_TASKS guard + EMPTY const semantics"
required_tests  = ["test_pmp_profile_struct_smoke"]
required_proofs = []
fault_model     = "get_pmp_profile(idx >= MAX_TASKS) Some döner, PmpProfile::EMPTY.region_count != 0, ya da active_regions() empty değil"

[requirement.SNTM-R5]
description     = "NAPOT alignment: size power-of-2 ≥ 8 byte AND base size-aligned"
required_tests  = ["test_napot_alignment_table"]
required_proofs = ["napot_alignment_correct"]
fault_model     = "Power-of-2 olmayan size kabul, unaligned base kabul, size < 8 kabul, ya da geçerli kombinasyon reject"

# ─── U-25 SNTM Phase 3 Requirements ──────────────────────────────────────

[requirement.SNTM-R6]
description     = "reload_pmp_profile preserves kernel+UART PMP entries (indices 0..PMP_DYNAMIC_START_ENTRY=8) + shadow update consistent (FIX-1 + FIX-2)"
required_tests  = ["test_reload_pmp_profile_kernel_invariant"]
required_proofs = ["reload_pmp_kernel_indices_untouched"]
fault_model     = "reload entry < 8'e yazıyor (UART entry 6/7 lock bypass — izolasyon BREAK), DENY stage skip, sfence.vma eksik (CSR ordering bug), ya da update_dynamic_pmp_shadow eksik (sonraki tick verify_pmp_integrity FAIL → kernel halt)"

[requirement.SNTM-R7]
description     = "is_valid_user_ptr multi-region: pointer in any active region matching Access perm + checked_add overflow safe + is_sntm_native fallback"
required_tests  = ["test_is_valid_user_ptr_multi_region_table", "test_is_valid_user_ptr_access_perm_table"]
required_proofs = ["multi_region_user_ptr_in_region", "multi_region_user_ptr_overflow_safe", "multi_region_dead_task_deny"]
fault_model     = "region dışı kabul, Access perm mismatch kabul, dead task (region_count=0) için true, ptr+size veya region.base+size overflow durumunda true, ya da is_sntm_native=false task'larda legacy stack-only path bozulması"

[requirement.SNTM-R8]
description     = "PMP_PROFILES generated.rs content matches sipahi.toml + NAPOT encoding bit-exact (codegen drift detect)"
required_tests  = ["test_pmp_profile_loaded_from_manifest"]
required_proofs = ["napot_encoding_size_consistent"]
fault_model     = "generated.rs stale (manifest değişti, codegen çalıştırılmadı), NAPOT encoding bit mismatch (size_log2 ≠ log2(size) ya da mask bit count off-by-one), region.base/size sipahi.toml'dan sapma"

# ─── U-26 SNTM Phase 4 Requirements ──────────────────────────────────────

[requirement.SNTM-R9]
description     = "Loader bounded_copy + zero_fill atomicity + kernel range overwrite guard + data/bss composition + region tail/stack zero (FIX-D info-leak guard)"
required_tests  = ["test_native_task_loaded_to_region", "test_native_task_bss_zero", "test_native_task_stack_zero"]
required_proofs = ["loader_bounded_copy_atomic", "loader_zero_fill_complete", "loader_no_kernel_overwrite", "loader_data_bss_composition_zero"]
fault_model     = "src_len > dst_size partial copy yazıldı, bss byte non-zero, kernel+wasm range (0x80000000..0x80600000) loader dst kabul edildi (FIX-A), dst+size overflow, data+bss composition undefined region tail byte, ya da stack region non-zero (FIX-D info-leak)"

[requirement.SNTM-R10]
description     = "Native task lifecycle (Loading → Ready → Running) + image embedded + PMP profile match (FIX-A NATIVE_TASK_BASE=0x80600000)"
required_tests  = ["test_native_task_image_embedded", "test_pmp_profile_loaded_from_manifest"]
required_proofs = []
fault_model     = "include_bytes! 0-byte (build pipeline broken — FIX-B Makefile build-native depend eksik), text > NAPOT region size, ELF magic kaldı (objcopy raw değil), ya da PMP_PROFILES[2] task_hello content drift (FIX-A relocate)"

[requirement.SNTM-R11]
description     = "isolate_task runtime: Running/Ready → Isolated state transition + idempotent (sys_exit handler core)"
required_tests  = ["test_sys_exit_runtime_isolates_task"]
required_proofs = []
fault_model     = "isolate_task sonrası state Isolated değil, ikinci çağrı state değişti, panic, ya da invalidate_task_capabilities çağrılmadı (sys_exit handler full integration U-27 demo'da)"

# ─── U-27 SNTM Phase 5 Requirements ──────────────────────────────────────

[requirement.SNTM-R12]
description     = "Cross-task PMP isolation statik kanıt: task A profile'ı task B region adresini reddedir + manifest overlap compile-time reject + runtime PMP_PROFILES disjoint assertion. Runtime ihlal observe (trap → isolate) U-27.5'e DEFER (Codex pre-review scope creep guard)."
required_tests  = ["test_pmp_profiles_disjoint"]
required_proofs = ["check_ptr_in_profile_rejects_other_task_region", "check_ptr_in_profile_symmetric_isolation"]
fault_model     = "PMP entry overlap allowed (sntm-validate bypass), region size off-by-one (boundary +1 byte kabul), Access::Write task A region'ı için kabul (perm matrix bug), ya da PMP_PROFILES[2]+[3] codegen drift (sntm-validate overlap check bypass)"
deferred        = "runtime_observe"
deferred_reason = "Runtime ihlal test'i trap_handler mcause 7 → isolate_task hook + tasks/task_hello cross-isolation-demo feature gerektirir; U-27 production live boot tuning ile scope creep — U-27.5 ayrı sprint"
deferred_target = "U-27.5 (cross-isolation-demo feature + trap hook)"

[requirement.SNTM-R13]
description     = "Sealed channel atomicity: seal_channels() POST-state assign_channel reddedir (idempotent + atomic — flag reset yok). TLA+ SealedAtomicityInvariant + Kani post-seal proof + runtime self-test."
required_tests  = ["test_sealed_channel_assign_rejected"]
required_proofs = ["post_seal_assign_returns_false", "seal_channels_idempotent"]
fault_model     = "seal=true post-state assign accepted (flag check bypass), seal=true ama state reset edildi (race), atomic ordering kayıp (Release/Acquire eksik), ya da seal_channels() ikinci çağrı state bozdu (idempotency violation)"

[requirement.SNTM-R14]
description     = "Multi-task SNTM scheduler integrity: iki is_sntm_native=true task runnable (task_hello + task_world), native_create_task idempotent (aynı task_id ikinci çağrı state bozmaz), PMP_PROFILES[2]+[3] disjoint reload, kernel mepc trap frame slot sync (context.S U-27 fix)."
required_tests  = ["test_two_native_tasks_runnable", "test_native_create_task_idempotent"]
required_proofs = []
fault_model     = "native_create_task ikinci çağrı task_hello state'i bozdu, scheduler is_sntm_native bit drift (task_id swap'inde flag kaymaz), PMP_PROFILES[2] task_world load sırasında overwrite, scheduler context switch sırasında pmpaddr[8..15] yanlış task profile'ı yüklendi, ya da context.S trap frame mepc slot update eksik (switch_context csrw mepc ezilir — U-26'da masked, U-27'de instruction access fault)"
