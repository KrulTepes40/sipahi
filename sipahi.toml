# Sipahi SNTM manifest — v1.5-rc1 minimal scaffold.
#
# Bu dosya şu an sntm-validate tool tarafından OKUNMUYOR — sadece scaffold.
# Sprint U-24 (SNTM Phase 2) sntm-validate ile aktif validation'a girecek.
# Sprint U-26 (SNTM Phase 4) kernel loader manifest'ten task region adreslerini
# çekecek.

[kernel]
name        = "sipahi"
version     = "1.1.1"      # mevcut kernel sürümü (post-U-22.5)
binary      = "target/riscv64imac-unknown-none-elf/release/sipahi"
stack_size  = 16384        # 16KB kernel stack (config.rs::KERNEL_STACK_SIZE)

[platform]
target       = "riscv64imac-unknown-none-elf"
machine      = "qemu-virt"
pmp_entries  = 16          # CVA6 default
ram_base     = 0x80000000
ram_size     = 0x20000000  # 512 MB

# ─── Tasks ──────────────────────────────────────────────────────

[[task]]
name          = "task_hello"
binary        = "target/riscv64imac-unknown-none-elf/release/task_hello"
task_id       = 2          # U-26 FIX-A: task_a=0, task_b=1 ile çakışma yok
priority      = 6          # legacy task_a(4)/task_b(8) arası
period_ticks  = 10         # 100ms @ 10ms/tick
budget_cycles = 100_000    # DAL-D minimal
dal_level     = "D"
# SAFE-1 (U-30): SNTM-SAFE Safe Native Profile.
# trust_tier="safe" production tier korunur. cross-isolation-demo cfg-gated
# unsafe block için demo_feature_waivers waiver (cfg_attr forbid + production
# compile-out). DAL-D + safe tier → DO-178C uyumlu.
trust_tier            = "safe"
demo_feature_waivers  = ["cross-isolation-demo"]

# SAFE-2 (U-31): per-task local capability grants. resource_id → action.
# Codegen emits LOCAL_CAP_TABLE[2] = [Write, None, Write, None] for these.
[[task.local_cap]]
resource_id = 0    # uart_console
action      = "Write"
[[task.local_cap]]
resource_id = 2    # channel_greeting (producer endpoint)
action      = "Write"

# U-26 FIX-A: NATIVE_TASK_BASE = 0x80600000 (kernel + 4MB wasm_arena sonrası).
# Eski 0x80100000 wasm_arena ortasında — silent overwrite (RAM 8MB içinde
# self-test build _end ~0x80430000). Yeni base: 6MB sonrası, 2MB headroom.
[[task.region]]
name = "text"
base = 0x80600000
size = 0x4000              # 16K NAPOT (0x80600000 % 0x4000 = 0)
perm = "RX"

[[task.region]]
name = "rodata"
base = 0x80604000
size = 0x1000              # 4K NAPOT
perm = "R"

[[task.region]]
name = "data"
base = 0x80605000
size = 0x1000              # 4K NAPOT (data + bss)
perm = "RW"

[[task.region]]
name = "stack"
base = 0x80610000
size = 0x2000              # 8K NAPOT (0x80610000 % 0x2000 = 0)
perm = "RW"

# guard region: implicit (NAPOT layout — SNTM design v0.5 §4.3 default-on).
# TOR layout için explicit guard region zorunlu olur, ama task_hello NAPOT.

# U-27 SNTM Phase 5: second native task (task_id=3).
# Memory layout: task_hello 0x80600000..0x80612000 + buffer → task_world
# 0x80700000+ (1MB margin). RAM_END 0xA0000000 → 511MB headroom.
# Budget/period FIX-C tuned (G5 production live boot watchdog window match):
# 500_000 cycles / 50 ticks (500ms). task_hello yield-loop kick-too-early
# policy regression'ı bu tuning ile çözüldü.
[[task]]
name          = "task_world"
binary        = "target/riscv64imac-unknown-none-elf/release/task_world"
task_id       = 3          # task_hello(2) ile çakışma yok
priority      = 7          # task_hello(6) + 1
period_ticks  = 50         # 500ms — FIX-C
budget_cycles = 500_000    # FIX-C
dal_level     = "D"
# SAFE-1 (U-30): pure safe tier — unconditional forbid(unsafe_code).
# demo_feature_waivers YOK (cfg-gated unsafe block yok).
trust_tier    = "safe"

# SAFE-2 (U-31): per-task local capability grants.
# LOCAL_CAP_TABLE[3] = [None, Write, Read, None] (uart deny, blackbox+channel R).
[[task.local_cap]]
resource_id = 1    # blackbox
action      = "Write"
[[task.local_cap]]
resource_id = 2    # channel_greeting (consumer endpoint)
action      = "Read"

[[task.region]]
name = "text"
base = 0x80700000          # task_hello.stack top 0x80612000 + 1MB margin
size = 0x4000              # 16K NAPOT (0x80700000 % 0x4000 = 0)
perm = "RX"

[[task.region]]
name = "rodata"
base = 0x80704000
size = 0x1000              # 4K NAPOT
perm = "R"

[[task.region]]
name = "data"
base = 0x80705000
size = 0x1000              # 4K NAPOT (data + bss)
perm = "RW"

[[task.region]]
name = "stack"
base = 0x80710000
size = 0x2000              # 8K NAPOT (0x80710000 % 0x2000 = 0)
perm = "RW"

# ─── Resources (SAFE-2 / sprint-u31) ────────────────────────────
# Static local capability table column space. LOCAL_CAP_TABLE codegen emits
# one column per resource, MAX_RESOURCES (config.rs) matches manifest count.

[[resource]]
id   = 0
name = "uart_console"
kind = "device"

[[resource]]
id   = 1
name = "blackbox"
kind = "log"

[[resource]]
id   = 2
name = "channel_greeting"
kind = "channel_endpoint"

[[resource]]
id   = 3
name = "reserved"
kind = "reserved"

# ─── Channels (SAFE-2 / sprint-u31) ─────────────────────────────
# Typed IPC + BOOT_CHANNELS codegen. Manifest = single source of truth for
# channel ownership (boot.rs assign_channel iterates BOOT_CHANNELS table).

[[channel]]
# Channel id=2 avoids legacy boot.rs hardcoded channels 0/1 (task_a ↔ task_b
# WASM-era IPC test harness). Channels 0/1 stay legacy-managed; manifest
# channels (id >= 2) drive native SNTM Phase 5+ wiring via BOOT_CHANNELS.
id        = 2
producer  = "task_hello"
consumer  = "task_world"
message   = "GreetingPing"
size      = 16             # repr(C) struct byte count (<= IPC_MSG_SIZE=64)
period_ms = 50             # optional flow metadata (CR FIX-D — manifest only)

# ─── Per-task local capability grants (SAFE-2) ──────────────────
# Granted later in this file under [[task.local_cap]]; manifest top-level
# only lists [[resource]] / [[channel]]. task_hello/task_world specific
# grants below would mean:
#   task_hello: writes uart_console + sends on channel_greeting
#   task_world: reads channel_greeting + writes blackbox
# Inline grants live with each [[task]] block above when wired in G3.
